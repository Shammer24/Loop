<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080b16" />
  <title>Loop v4</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">Loop</div>
      <div class="top-actions">
        <button class="ghost small" id="openCreateTop">Crear</button>
        <button class="ghost small" id="openProfileTop">Perfil</button>
      </div>
    </header>

    <main id="feed" class="feed"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="feed">Feed</button>
      <button class="nav-btn" data-screen="create">Crear</button>
      <button class="nav-btn" data-screen="vs">VS</button>
      <button class="nav-btn" data-screen="profile">Perfil</button>
    </nav>

    <section class="sheet hidden" id="createSheet">
      <div class="sheet-card">
        <div class="sheet-head">
          <h3>Crear en Loop</h3>
          <button class="ghost" data-close="createSheet">✕</button>
        </div>
        <div class="grid2">
          <button class="big-action" data-create-type="post">Post</button>
          <button class="big-action" data-create-type="reto">Reto</button>
          <button class="big-action" data-create-type="vs">VS</button>
          <button class="big-action" data-create-type="respuesta">Respuesta</button>
        </div>
        <input id="creatorUser" placeholder="@usuario" />
        <input id="creatorTitle" placeholder="Título" />
        <textarea id="creatorCaption" placeholder="Escribe algo que enganche..."></textarea>
        <button id="publishBtn" class="primary">Publicar demo</button>
      </div>
    </section>

    <section class="sheet hidden" id="profileSheet">
      <div class="sheet-card">
        <div class="sheet-head">
          <h3>Tu perfil</h3>
          <button class="ghost" data-close="profileSheet">✕</button>
        </div>
        <div class="profile-box">
          <div class="avatar big">K</div>
          <div>
            <div class="p-name">@kevin.loop</div>
            <div class="p-sub">Creador · 12 VS ganados</div>
          </div>
        </div>
        <div class="stats">
          <div><strong>18.2K</strong><span>Likes</span></div>
          <div><strong>1.3K</strong><span>Followers</span></div>
          <div><strong>27</strong><span>Retos</span></div>
        </div>
      </div>
    </section>

    <section class="sheet hidden" id="vsSheet">
      <div class="sheet-card">
        <div class="sheet-head">
          <h3>VS Arena</h3>
          <button class="ghost" data-close="vsSheet">✕</button>
        </div>
        <div class="vs-card">
          <div class="vs-side">
            <div class="avatar big">M</div>
            <strong>@mike.loop</strong>
            <span>Dance Round</span>
            <button class="primary vote-btn">Votar</button>
          </div>
          <div class="vs-middle">VS</div>
          <div class="vs-side">
            <div class="avatar big">A</div>
            <strong>@anna.loop</strong>
            <span>Dance Round</span>
            <button class="primary vote-btn">Votar</button>
          </div>
        </div>
      </div>
    </section>

    <section class="sheet hidden" id="commentsSheet">
      <div class="sheet-card comments-card">
        <div class="sheet-head">
          <h3>Comentarios</h3>
          <button class="ghost" data-close="commentsSheet">✕</button>
        </div>
        <div id="commentsList" class="comments-list"></div>
        <div class="comment-row">
          <input id="commentInput" placeholder="Escribe un comentario..." />
          <button id="sendComment" class="primary">Enviar</button>
        </div>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
